# --------------------------------------------------------------------------- #
# 07 — Circuit breakers
#
# One backend, one cluster, very tight circuit breaker thresholds. Every
# request takes ~3s (we rewrite to the backend's /slow), so when verify.sh
# fires 15 of them concurrently, the breakers trip immediately.
#
# Expected outcome:
#   - 3 fit under max_requests/max_connections   -> 200
#   - 2 fit in max_pending_requests              -> 200 (after a wait)
#   - 10 hit the overflow                        -> 503 with x-envoy-overloaded
#                                                   and RESPONSE_FLAGS=UO
#
# Outlier detection (example 05) ejected BAD endpoints; circuit breakers
# protect a GOOD endpoint from being overwhelmed. Different problem,
# different lever.
# --------------------------------------------------------------------------- #

admin:
  address: { socket_address: { address: 0.0.0.0, port_value: 9901 } }

static_resources:
  listeners:
    - name: listener_http
      address: { socket_address: { address: 0.0.0.0, port_value: 10000 } }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: cb_demo
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: cluster_slow
                            # Send everything to /slow on the backend.
                            # Client passes ?seconds=N in the query string;
                            # regex_rewrite only touches the path, query
                            # is preserved.
                            regex_rewrite:
                              pattern: { regex: ".*" }
                              substitution: "/slow"

  clusters:
    - name: cluster_slow
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN

      # ----------------------------------------------------------------- #
      # CIRCUIT BREAKERS
      #
      # Per-priority thresholds. Most users only ever touch DEFAULT;
      # routes can opt into HIGH via `priority: HIGH` on the route's
      # match, with separate budgets defined in another `thresholds:`
      # entry below.
      #
      # `track_remaining: true` emits "remaining_*" gauges so you can
      # graph headroom.
      # ----------------------------------------------------------------- #
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            # Max simultaneous upstream TCP connections.
            # For HTTP/1.1 backends (our Flask app), connections ≈
            # concurrent requests, so this is usually the binding limit.
            max_connections: 3

            # Max requests waiting for a connection / stream.
            max_pending_requests: 2

            # Max in-flight HTTP requests (HTTP/2 streams across all
            # connections, or just connections for HTTP/1.1).
            max_requests: 3

            # Max concurrent retries across the cluster. Separate from
            # per-request num_retries from example 06.
            max_retries: 1

            track_remaining: true

      load_assignment:
        cluster_name: cluster_slow
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: hello, port_value: 8080 }
