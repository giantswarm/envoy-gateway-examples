services:
  hello:
    build: ../../apps/helloworld
    environment: { NAME: hello }
    expose: ["8080"]

  envoy:
    image: envoyproxy/envoy:v1.38.3
    # --concurrency 1 makes the per-worker bucket behavior easy to reason
    # about in the demo. Without it, the per-worker buckets are separate
    # and "send 6 requests, expect 5 OK + 1 over-limit" wouldn't be a
    # reliable assertion.
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info", "--concurrency", "1"]
    ports:
      - "10000:10000"
      - "9901:9901"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - hello
