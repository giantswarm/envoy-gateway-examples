services:
  hello:
    build: ../../apps/helloworld
    environment: { NAME: hello }
    expose: ["8080"]

  # Jaeger all-in-one bundles collector + storage (memory) + UI.
  # OTLP gRPC: 4317, UI: 16686.
  jaeger:
    image: jaegertracing/all-in-one:1.56
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    expose:
      - "4317"      # OTLP gRPC (envoy ships spans here)
    ports:
      - "16686:16686"   # UI — http://localhost:16686

  envoy:
    image: envoyproxy/envoy:v1.38.3
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    ports:
      - "10000:10000"
      - "9901:9901"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - hello
      - jaeger
