# --------------------------------------------------------------------------- #
# 18 — Distributed tracing via OTLP
#
# Envoy exports trace spans for every request through the OpenTelemetry
# tracer. We point it at the local Jaeger all-in-one (which speaks OTLP
# on :4317 and serves a UI on :16686).
#
# Tracing is configured in two places:
#   - listener.tracing — per-listener sampling, custom tags
#   - http_filters: envoy.filters.http.router — must have start_child_span
#                                                 (default) for context to
#                                                 propagate upstream
# The actual exporter (OTLP) is a top-level `tracing.http` provider in
# the bootstrap (see below).
# --------------------------------------------------------------------------- #

admin:
  address: { socket_address: { address: 0.0.0.0, port_value: 9901 } }

# Top-level tracing config — names the provider (OpenTelemetry) and
# points at the gRPC service that ships spans.
tracing:
  http:
    name: envoy.tracers.opentelemetry
    typed_config:
      "@type": type.googleapis.com/envoy.config.trace.v3.OpenTelemetryConfig
      grpc_service:
        envoy_grpc:
          cluster_name: otel_collector
        timeout: 0.250s
      service_name: envoy-tutorial-18

static_resources:
  listeners:
    - name: listener_0
      address: { socket_address: { address: 0.0.0.0, port_value: 10000 } }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http

                # Per-listener tracing config.
                tracing:
                  # Sample 100% in the tutorial. Real-world: 1-10%.
                  random_sampling: { value: 100.0 }
                  custom_tags:
                    - tag: env
                      literal: { value: tutorial }
                    - tag: x_user_id
                      request_header:
                        name: x-user-id
                        default_value: anonymous

                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog

                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                      # start_child_span defaults to true — Envoy creates
                      # a child span for the upstream call. Setting it to
                      # false would only record the ingress span.

                route_config:
                  name: route
                  virtual_hosts:
                    - name: hello
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: hello }

  clusters:
    - name: hello
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: hello
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: hello, port_value: 8080 }

    # OTel-compatible collector — Jaeger all-in-one speaks OTLP gRPC on
    # port 4317 (the OTLP standard).
    - name: otel_collector
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      # OTLP runs over HTTP/2 — must tell Envoy to upgrade.
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: otel_collector
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: jaeger, port_value: 4317 }
