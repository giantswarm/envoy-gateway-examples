# --------------------------------------------------------------------------- #
# 14 — Lua filter
#
# `envoy.filters.http.lua` runs an inline Lua script per request/response.
# Use it for small transformations Envoy doesn't natively expose: pulling a
# value out of a body, computing a derived header, tweaking authority, etc.
#
# Real production extension lives in Wasm (see ex 15) — Lua is the
# zero-build, copy-paste-friendly alternative. The runtime is sandboxed
# LuaJIT.
# --------------------------------------------------------------------------- #

admin:
  address: { socket_address: { address: 0.0.0.0, port_value: 9901 } }

static_resources:
  listeners:
    - name: listener_0
      address: { socket_address: { address: 0.0.0.0, port_value: 10000 } }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog

                http_filters:
                  # The Lua filter MUST come before the router. Order
                  # matters: filters earlier in the list run earlier on
                  # the request path.
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      # Inline script. envoy_on_request runs before the
                      # request reaches the upstream; envoy_on_response
                      # runs after we get the response back.
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(handle)
                            -- Read an inbound header (lowercase access).
                            local who = handle:headers():get("x-from") or "anonymous"
                            -- Inject a fresh header sent to upstream.
                            handle:headers():add("x-lua-greeting",
                                                 "hello-" .. who .. "-from-lua")
                            -- Log to Envoy's stdout (info level).
                            handle:logInfo("lua: request from " .. who)
                          end

                          function envoy_on_response(handle)
                            -- Stamp a response header so clients see Lua ran.
                            handle:headers():add("x-served-by-lua", "yes")
                          end

                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                route_config:
                  name: route
                  virtual_hosts:
                    - name: hello
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: hello }

  clusters:
    - name: hello
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: hello
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: hello, port_value: 8080 }
