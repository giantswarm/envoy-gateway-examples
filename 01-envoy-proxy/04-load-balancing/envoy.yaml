# --------------------------------------------------------------------------- #
# 04 — Load balancing
#
# Three identical backends (hello-a, hello-b, hello-c) sitting behind THREE
# clusters that share the same endpoints but use different lb_policy:
#
#   cluster_rr — ROUND_ROBIN    -> /rr
#   cluster_lr — LEAST_REQUEST  -> /lr
#   cluster_rh — RING_HASH      -> /rh   (consistent hash on x-user-id)
#
# All three routes rewrite the path to "/" so the backend's response JSON
# carries `from_` — the per-replica NAME — which is what we use to verify
# distribution.
# --------------------------------------------------------------------------- #

admin:
  address: { socket_address: { address: 0.0.0.0, port_value: 9901 } }

static_resources:
  listeners:
    - name: listener_http
      address: { socket_address: { address: 0.0.0.0, port_value: 10000 } }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: lb_demo
                      domains: ["*"]
                      routes:

                        # ------------------------------------------------- #
                        # /rr  — ROUND_ROBIN
                        # Endpoints picked in strict order: A, B, C, A, B, C, …
                        # ------------------------------------------------- #
                        - match: { prefix: "/rr" }
                          route:
                            cluster: cluster_rr
                            regex_rewrite:
                              pattern: { regex: ".*" }
                              substitution: "/"

                        - match: { prefix: "/lr/slow" }
                          route:
                            cluster: cluster_slow
                            prefix_rewrite: "/slow"

                        # ------------------------------------------------- #
                        # /lr  — LEAST_REQUEST
                        # Picks the endpoint with the fewest in-flight
                        # requests. Under no load it behaves like a random
                        # 2-of-N pick; under load it favours less-busy
                        # endpoints.
                        # ------------------------------------------------- #
                        - match: { prefix: "/lr" }
                          route:
                            cluster: cluster_lr
                            regex_rewrite:
                              pattern: { regex: ".*" }
                              substitution: "/"

                        # ------------------------------------------------- #
                        # /rh  — RING_HASH
                        # Consistent hash on the x-user-id header. Same
                        # header value always lands on the same endpoint
                        # (until the endpoint set changes). hash_policy is
                        # what feeds the hash; without it RING_HASH falls
                        # back to picking randomly.
                        # ------------------------------------------------- #
                        - match: { prefix: "/rh" }
                          route:
                            cluster: cluster_rh
                            regex_rewrite:
                              pattern: { regex: ".*" }
                              substitution: "/"
                            hash_policy:
                              - header: { header_name: "x-user-id" }
                              # - query_parameter: { name: "shard" }

                        # Catch-all -> round robin
                        - match: { prefix: "/" }
                          route:
                            cluster: cluster_rr

  clusters:

    # --------------------------------------------------------------------- #
    # cluster_rr — ROUND_ROBIN
    # Three endpoints, one DNS name each. STRICT_DNS resolves and refreshes
    # them periodically. Same endpoint set is repeated in the LR and RH
    # clusters below — only lb_policy changes.
    # --------------------------------------------------------------------- #
    - name: cluster_rr
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: cluster_rr
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: hello-a, port_value: 8080 } }
              - endpoint:
                  address: { socket_address: { address: hello-b, port_value: 8080 } }
              - endpoint:
                  address: { socket_address: { address: hello-c, port_value: 8080 } }

    # --------------------------------------------------------------------- #
    # cluster_slow — SLOW CLUSTER TESTING
    # --------------------------------------------------------------------- #
    - name: cluster_slow
      type: STRICT_DNS
      lb_policy: RANDOM
      load_assignment:
        cluster_name: cluster_slow
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: hello-c, port_value: 8080 } }

    # --------------------------------------------------------------------- #
    # cluster_lr — LEAST_REQUEST
    # --------------------------------------------------------------------- #
    - name: cluster_lr
      type: STRICT_DNS
      lb_policy: LEAST_REQUEST
      least_request_lb_config:
        # P2C: pick CHOICE_COUNT endpoints at random, send to the one with
        # the lowest in-flight count. Default 2 (the textbook "Power of
        # Two Choices"). Raise it for tighter balance at the cost of more
        # CPU per request.
        choice_count: 2
      load_assignment:
        cluster_name: cluster_lr
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: hello-a, port_value: 8080 } }
              - endpoint:
                  address: { socket_address: { address: hello-b, port_value: 8080 } }
              - endpoint:
                  address: { socket_address: { address: hello-c, port_value: 8080 } }

    # --------------------------------------------------------------------- #
    # cluster_rh — RING_HASH
    # Consistent hashing. The "ring" is a circle of (hash, endpoint) pairs;
    # each request hashes to a point on the ring and walks clockwise to the
    # first endpoint. Adding/removing an endpoint only moves 1/N of the
    # traffic — that's the property that makes it good for sticky routing.
    # --------------------------------------------------------------------- #
    - name: cluster_rh
      type: STRICT_DNS
      lb_policy: RING_HASH
      ring_hash_lb_config:
        # Bigger ring = better balance, more memory. 1024 is plenty for 3
        # endpoints. Production rings are usually 65536+.
        minimum_ring_size: 1024
        maximum_ring_size: 8192
      load_assignment:
        cluster_name: cluster_rh
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: hello-a, port_value: 8080 } }
              - endpoint:
                  address: { socket_address: { address: hello-b, port_value: 8080 } }
              - endpoint:
                  address: { socket_address: { address: hello-c, port_value: 8080 } }
