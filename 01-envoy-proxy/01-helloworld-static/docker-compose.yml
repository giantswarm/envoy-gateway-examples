services:
  helloworld:
    build:
      context: ../../apps/helloworld
    environment:
      NAME: helloworld
    expose:
      - "8080"

  envoy:
    image: envoyproxy/envoy:v1.38.3
    command:
      - "-c"
      - "/etc/envoy/envoy.yaml"
      - "--log-level"
      - "info"
    ports:
      - "10000:10000"   # data plane (the listener)
      - "9901:9901"     # admin
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - helloworld
