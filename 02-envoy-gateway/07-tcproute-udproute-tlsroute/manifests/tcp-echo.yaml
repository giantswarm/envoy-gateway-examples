---
# Plain TCP echo server. Connects, reads bytes, writes them back
# (with a configurable prefix). Used to demonstrate TCPRoute — Envoy
# does L4 forwarding only; there's no HCM, no routing-by-content.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-echo
  namespace: l4-demo
  labels:
    app: tcp-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tcp-echo
  template:
    metadata:
      labels:
        app: tcp-echo
    spec:
      containers:
        - name: tcp-echo
          image: docker.io/istio/tcp-echo-server:1.3
          args: ["9000", "hello"]
          ports:
            - containerPort: 9000
              name: tcp
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }

---
apiVersion: v1
kind: Service
metadata:
  name: tcp-echo
  namespace: l4-demo
spec:
  type: ClusterIP
  selector:
    app: tcp-echo
  ports:
    - name: tcp
      port: 9000
      targetPort: tcp
      protocol: TCP
