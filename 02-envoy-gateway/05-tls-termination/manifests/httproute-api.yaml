---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
  namespace: demo
spec:
  parentRefs:
    - name: secure
      sectionName: https-api
  hostnames:
    - api.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        # Tag the request so we can tell which listener served it.
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: x-served-by
                value: api-listener
      backendRefs:
        - name: helloworld
          port: 8080
