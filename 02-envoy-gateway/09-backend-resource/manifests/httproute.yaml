---
# HTTPRoute pointing at TWO Backend CRs.
#
# A backendRef can target a Backend by using
#   group: gateway.envoyproxy.io
#   kind:  Backend
# (the standard Service backendRef uses group "" and kind Service —
# either group is empty or kind is Service.)
#
# The `port:` field is required by the Gateway API schema but EG
# ignores it for Backend refs — the port lives inside the Backend's
# endpoints[].
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backends
  namespace: backend-demo
spec:
  parentRefs:
    - name: backend-demo

  rules:
    # ---- /external/* -> Backend example-com (port 80, FQDN) -------- #
    - matches:
        - path:
            type: PathPrefix
            value: /external
      filters:
        # `replacePrefixMatch: /` strips the /external prefix before
        # forwarding. `/external` -> `/`, `/external/foo` -> `/foo`.
        - type: URLRewrite
          urlRewrite:
            hostname: example.com           # set :authority so the
                                            # backend sees the right Host header
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: example-com
          port: 80                          # ignored by EG; required by schema

    # ---- /internal/* -> Backend helloworld-fqdn (cluster.local) ---- #
    - matches:
        - path:
            type: PathPrefix
            value: /internal
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: helloworld-fqdn
          port: 8080
