---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: observed
  namespace: demo
spec:
  gatewayClassName: eg
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: observed-proxy            # same-namespace ref
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
