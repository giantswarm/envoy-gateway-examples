---
# A second HTTPRoute used in verify.sh step 5 to demonstrate xDS
# convergence — we apply this AFTER inspecting the initial state, then
# re-dump to see the new virtual host / route appear.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-extra
  namespace: demo
spec:
  parentRefs:
    - name: inspect
  hostnames:
    - "extra.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: helloworld
          port: 8080
