---
# Holds the OIDC client secret that EG presents to Dex when
# exchanging the auth code for a token. MUST match
# `staticClients[0].secret` in dex.yaml — they're two views of the
# same string.
apiVersion: v1
kind: Secret
metadata:
  name: oidc-client-secret
  namespace: demo
type: Opaque
stringData:
  client-secret: totally-tutorial-client-secret
