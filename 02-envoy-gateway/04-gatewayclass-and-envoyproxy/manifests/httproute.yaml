---
# Single-route HTTPRoute — the focus of this example is the data
# plane CR, not the route table. Catch-all path → helloworld.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: helloworld
  namespace: demo
spec:
  parentRefs:
    - name: tuned
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: helloworld
          # The helloworld Service exposes :8080 (see
          # 00-kind-bootstrap/manifests/helloworld.yaml). Matching that
          # number here — not the listener port — is what populates
          # the EDS cluster.
          port: 8080
