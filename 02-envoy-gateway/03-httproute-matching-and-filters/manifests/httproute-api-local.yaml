---
# A SECOND HTTPRoute attached to the same Gateway, but scoped to a
# hostname. Equivalent to Phase 1 example 03's `api.local` virtual host.
# Two HTTPRoutes can target the same parentRef; Envoy Gateway merges
# them into the same route table, with hostname matching layered in.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-local
  namespace: demo
spec:
  parentRefs:
    - name: routing
  hostnames:
    - "api.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /echo
      backendRefs:
        - name: helloworld
          port: 8080
