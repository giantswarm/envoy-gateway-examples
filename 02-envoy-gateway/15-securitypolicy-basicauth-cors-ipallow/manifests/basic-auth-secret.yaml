---
# Credentials for the SecurityPolicy.basicAuth feature.
#
# Secret data is in htpasswd format under the key `.htpasswd`:
#   <username>:{SHA}<base64(sha1(password))>\n
#
# IMPORTANT: Envoy's basic_auth filter ONLY accepts the SHA-1
# format (`{SHA}...`). Bcrypt (`$2a$10$...`) — the modern default
# of every other tool — is REJECTED with:
#   "basic auth: unsupported htpasswd format: please use {SHA}"
# That rejection happens at xDS push time, so the whole listener
# fails to load — symptoms look like Envoy crashing.
#
# Generate hashes with:
#   htpasswd -nbs alice password
#   # the -s flag means SHA-1 (NOT -B which means bcrypt)
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth-creds
  namespace: demo
type: Opaque
stringData:
  # alice / password   (SHA-1, base64-encoded)
  .htpasswd: |
    alice:{SHA}W6ph5Mm5Pz8GgiULbPgzG37mj9g=
