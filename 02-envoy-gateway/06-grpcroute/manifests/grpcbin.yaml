---
# moul/grpcbin — a tiny gRPC reference server. Like httpbin but for
# gRPC. Exposes:
#
#   hello.HelloService/SayHello                  (unary)
#   hello.HelloService/LotsOfReplies             (server streaming)
#   hello.HelloService/LotsOfGreetings           (client streaming)
#   hello.HelloService/BidiHello                 (bidi streaming)
#   grpcbin.GRPCBin/Empty                        (unary)
#   grpcbin.GRPCBin/DummyUnary                   (unary)
#   grpcbin.GRPCBin/DummyServerStream            (server streaming)
#   grpcbin.GRPCBin/SpecificError                (controlled error)
#   grpcbin.GRPCBin/RandomError                  (random error)
#   grpc.reflection.v1alpha.ServerReflection/... (reflection — lets
#                                                 grpcurl list services)
#
# gRPC listens on 9000 (plaintext), HTTP/JSON on 9001.
# Public image; the project only publishes tag `latest` and git-SHA
# tags so we pin to latest with a comment — same caveat we had with
# envoyproxy/ratelimit in Phase 1 ex 11.
apiVersion: v1
kind: Namespace
metadata:
  name: grpc-demo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpcbin
  namespace: grpc-demo
  labels:
    app: grpcbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpcbin
  template:
    metadata:
      labels:
        app: grpcbin
    spec:
      containers:
        - name: grpcbin
          image: docker.io/moul/grpcbin:latest
          ports:
            - containerPort: 9000
              name: grpc
            - containerPort: 9001
              name: http
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }

---
apiVersion: v1
kind: Service
metadata:
  name: grpcbin
  namespace: grpc-demo
  labels:
    app: grpcbin
spec:
  type: ClusterIP
  selector:
    app: grpcbin
  ports:
    - name: grpc
      port: 9000
      targetPort: grpc
      # `appProtocol: kubernetes.io/h2c` tells consumers (Envoy
      # included) this is gRPC over plaintext HTTP/2. EG honors it
      # when building the cluster — no need for a BackendTLSPolicy
      # or ClientTrafficPolicy hack to force HTTP/2.
      appProtocol: kubernetes.io/h2c
    - name: http
      port: 9001
      targetPort: http
