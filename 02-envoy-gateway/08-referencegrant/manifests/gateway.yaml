---
# Gateway in `apps`, but the TLS cert it points at lives in `demo`.
# The certificateRef sets `namespace: demo` — without a matching
# ReferenceGrant in `demo`, the listener reports
# `ResolvedRefs=False reason: InvalidCertificateRef` ("ref is not
# permitted by ReferenceGrant").
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: crossns
  namespace: apps
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      hostname: apps.local
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: apps-tls
            namespace: demo            # <-- CROSS-NAMESPACE
      allowedRoutes:
        namespaces:
          from: Same                   # HTTPRoute must live in `apps`
