---
# Permits Gateways in `apps` to read Secrets (TLS material) in this
# namespace (`demo`). The Secret OWNS the trust decision — that's
# the whole security model: the resource being read is in control.
#
# ReferenceGrant lives in the namespace OF THE RESOURCE BEING READ,
# NOT the namespace doing the reading. (Easy to get backwards.)
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: gateway-to-tls-secrets
  namespace: demo
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: apps              # <-- who's allowed in
  to:
    - group: ""                    # core API group
      kind: Secret
      # `name:` is optional. Omit to grant access to ALL Secrets in
      # the namespace; include to restrict to a single Secret.
      name: apps-tls
