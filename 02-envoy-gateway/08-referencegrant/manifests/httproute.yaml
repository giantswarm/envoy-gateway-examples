---
# HTTPRoute lives in `apps` alongside the Gateway. Its backendRef
# points at `demo/helloworld` — the second cross-namespace edge.
# Needs a ReferenceGrant in `demo` permitting HTTPRoutes from
# `apps` to read Services there.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app
  namespace: apps
spec:
  parentRefs:
    - name: crossns
  hostnames:
    - apps.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: helloworld
          namespace: demo              # <-- CROSS-NAMESPACE
          port: 8080                   # same Service exposed by 00-kind-bootstrap
