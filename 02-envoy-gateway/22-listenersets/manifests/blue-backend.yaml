---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blue-nginx-conf
  namespace: team-blue
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;
        location / {
          add_header content-type "application/json" always;
          return 200 '{"team":"blue","via":"xlistenerset"}\n';
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-backend
  namespace: team-blue
  labels: { app: blue-backend }
spec:
  replicas: 1
  selector: { matchLabels: { app: blue-backend } }
  template:
    metadata: { labels: { app: blue-backend } }
    spec:
      containers:
        - name: nginx
          image: docker.io/library/nginx:1.27-alpine
          ports: [{ containerPort: 80, name: http }]
          volumeMounts:
            - { name: conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf, readOnly: true }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }
      volumes:
        - name: conf
          configMap: { name: blue-nginx-conf }

---
apiVersion: v1
kind: Service
metadata:
  name: blue-backend
  namespace: team-blue
spec:
  type: ClusterIP
  selector: { app: blue-backend }
  ports: [{ name: http, port: 80, targetPort: http }]
